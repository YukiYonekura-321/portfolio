services:
  backend:
    build: ./famdish-backend-rails
    ports:
      - "3001:3001"
    environment:
      RAILS_ENV: development
      FAMDISH_BACKEND_RAILS_DATABASE_HOST: db
      FAMDISH_BACKEND_RAILS_DATABASE_PORT: 5432
      FAMDISH_BACKEND_RAILS_DATABASE_USERNAME: postgres
      FAMDISH_BACKEND_RAILS_DATABASE_PASSWORD: password
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./famdish-backend-rails:/app

  frontend:
    build: ./famdish-front-react
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    volumes:
      - ./famdish-front-react:/app
      - /app/node_modules
      - /app/.next

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: password
  redis:
    image: redis:7
    ports:
      - "6379:6379"
